<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOVAI Admin - Imóveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="logo">MOV<span>AI</span></div><span class="badge">Admin</span></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
        <div class="nav-section">Gestão</div>
        <a href="properties.html" class="nav-item" data-page="properties"><i class="fas fa-building"></i> Imóveis</a>
        <a href="leads.html" class="nav-item" data-page="leads"><i class="fas fa-user-plus"></i> Leads</a>
        <a href="appointments.html" class="nav-item" data-page="appointments"><i class="fas fa-calendar-alt"></i> Agendamentos</a>
        <div class="nav-section">Sistema</div>
        <a href="users.html" class="nav-item" data-page="users"><i class="fas fa-users-cog"></i> Usuários</a>
        <a href="chatbot.html" class="nav-item" data-page="chatbot"><i class="fas fa-robot"></i> Chatbot</a>
        <a href="reports.html" class="nav-item" data-page="reports"><i class="fas fa-chart-bar"></i> Relatórios</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-avatar">U</div>
        <div class="user-info"><div class="user-name">Usuário</div><div class="user-role">Admin</div></div>
        <button class="logout-btn" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </aside>

    <div class="main-content">
      <header class="top-header">
        <button class="menu-toggle"><i class="fas fa-bars"></i></button>
        <h2 class="page-title">Imóveis</h2>
        <div class="header-actions">
          <div class="header-search"><i class="fas fa-search"></i><input type="text" placeholder="Buscar..." id="globalSearch"></div>
        </div>
      </header>

      <div class="page-content">
        <!-- Toolbar -->
        <div class="toolbar">
          <div class="filters-bar">
            <div class="search-input">
              <i class="fas fa-search"></i>
              <input type="text" class="form-control" id="searchInput" placeholder="Buscar imóveis...">
            </div>
            <select class="form-control" id="filterStatus">
              <option value="">Todos os Status</option>
              <option value="disponivel">Disponível</option>
              <option value="vendido">Vendido</option>
              <option value="alugado">Alugado</option>
              <option value="reservado">Reservado</option>
              <option value="inativo">Inativo</option>
            </select>
            <select class="form-control" id="filterType">
              <option value="">Todos os Tipos</option>
              <option value="apartamento">Apartamento</option>
              <option value="casa">Casa</option>
              <option value="cobertura">Cobertura</option>
              <option value="terreno">Terreno</option>
              <option value="comercial">Comercial</option>
              <option value="rural">Rural</option>
            </select>
          </div>
          <div style="display:flex;gap:.5rem">
            <a href="property-form.html" class="btn btn-primary"><i class="fas fa-plus"></i> Novo Imóvel</a>
          </div>
        </div>

        <!-- Table -->
        <div class="card">
          <div class="card-body no-padding">
            <div class="table-wrapper">
              <table id="propertiesTable">
                <thead>
                  <tr>
                    <th data-sort="id">ID <i class="fas fa-sort sort-icon"></i></th>
                    <th>Imagem</th>
                    <th data-sort="title">Título <i class="fas fa-sort sort-icon"></i></th>
                    <th data-sort="type">Tipo <i class="fas fa-sort sort-icon"></i></th>
                    <th data-sort="price">Preço <i class="fas fa-sort sort-icon"></i></th>
                    <th>Cidade</th>
                    <th data-sort="status">Status <i class="fas fa-sort sort-icon"></i></th>
                    <th>Corretor</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="propertiesBody">
                  <tr><td colspan="9" class="empty-state"><div class="page-loading"><div class="spinner"></div></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="card-footer">
            <span class="page-info" id="pageInfo">-</span>
            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal modal-sm">
      <div class="modal-header"><h3>Confirmar Exclusão</h3><button class="modal-close"><i class="fas fa-times"></i></button></div>
      <div class="modal-body">
        <p style="text-align:center"><i class="fas fa-exclamation-triangle" style="font-size:2.5rem;color:var(--danger);margin-bottom:1rem;display:block"></i>
        Tem certeza que deseja excluir este imóvel? Esta ação não pode ser desfeita.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="Modal.close('deleteModal')">Cancelar</button>
        <button class="btn btn-danger" id="confirmDelete"><i class="fas fa-trash"></i> Excluir</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    let currentPage = 1;
    let deleteId = null;

    async function loadProperties(page = 1) {
      currentPage = page;
      const search = document.getElementById('searchInput').value;
      const status = document.getElementById('filterStatus').value;
      const type = document.getElementById('filterType').value;

      let url = `/properties?page=${page}&limit=10`;
      if (search) url += `&search=${encodeURIComponent(search)}`;
      if (status) url += `&status=${status}`;
      if (type) url += `&type=${type}`;

      const tbody = document.getElementById('propertiesBody');
      showLoading(tbody.closest('.card'));

      try {
        const res = await Api.get(url);
        const items = res.data?.properties || res.data || [];
        const pagination = res.pagination || {};

        if (!items.length) {
          tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><i class="fas fa-building"></i><h4>Nenhum imóvel encontrado</h4><p>Tente ajustar os filtros ou adicione um novo imóvel.</p></div></td></tr>';
        } else {
          tbody.innerHTML = items.map(p => {
            const img = p.images && p.images.length ? p.images[0] : '';
            const imgSrc = img ? (img.startsWith('http') ? img : `http://localhost:3001${img}`) : '';
            return `
            <tr>
              <td>#${p.id}</td>
              <td>${imgSrc ? `<img src="${imgSrc}" style="width:50px;height:35px;object-fit:cover;border-radius:4px" onerror="this.style.display='none'">` : '<i class="fas fa-image" style="color:var(--gray-300)"></i>'}</td>
              <td><strong>${p.title || '-'}</strong></td>
              <td><span class="badge badge-gray">${p.type || '-'}</span></td>
              <td><strong>${formatCurrency(p.price)}</strong></td>
              <td>${p.city || '-'}</td>
              <td>${getStatusBadge(p.status)}</td>
              <td>${p.agent_name || '-'}</td>
              <td>
                <div class="action-btns">
                  <a href="property-form.html?id=${p.id}" class="btn btn-icon btn-ghost sm" title="Editar"><i class="fas fa-pen"></i></a>
                  <button class="btn btn-icon btn-ghost sm" title="Excluir" onclick="confirmDeleteProperty(${p.id})"><i class="fas fa-trash" style="color:var(--danger)"></i></button>
                </div>
              </td>
            </tr>`;
          }).join('');
        }

        document.getElementById('pageInfo').textContent = `Mostrando ${items.length} de ${pagination.total || items.length} imóveis`;
        renderPagination(document.getElementById('pagination'), pagination.page || 1, pagination.totalPages || 1, loadProperties);

      } catch (err) {
        Toast.error('Erro ao carregar imóveis: ' + err.message);
        tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Erro ao carregar dados</p></div></td></tr>';
      } finally {
        hideLoading(tbody.closest('.card'));
      }
    }

    function confirmDeleteProperty(id) {
      deleteId = id;
      Modal.open('deleteModal');
    }

    document.getElementById('confirmDelete').addEventListener('click', async () => {
      if (!deleteId) return;
      try {
        await Api.delete(`/properties/${deleteId}`);
        Toast.success('Imóvel excluído com sucesso');
        Modal.close('deleteModal');
        loadProperties(currentPage);
      } catch (err) {
        Toast.error('Erro ao excluir: ' + err.message);
      }
      deleteId = null;
    });

    // Search and filters
    document.getElementById('searchInput').addEventListener('input', debounce(() => loadProperties(1)));
    document.getElementById('filterStatus').addEventListener('change', () => loadProperties(1));
    document.getElementById('filterType').addEventListener('change', () => loadProperties(1));

    loadProperties();
  </script>
</body>
</html>
