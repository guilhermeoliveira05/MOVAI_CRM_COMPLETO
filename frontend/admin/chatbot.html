<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOVAI Admin - Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .chat-layout { display: grid; grid-template-columns: 340px 1fr; gap: 0; height: calc(100vh - var(--header-height) - 3rem); }
    .chat-sidebar { border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; overflow: hidden; }
    .chat-sidebar-header { padding: 1rem; border-bottom: 1px solid var(--gray-100); }
    .chat-sidebar-header input { width: 100%; }
    .chat-list-wrapper { flex: 1; overflow-y: auto; }
    .chat-main { display: flex; flex-direction: column; overflow: hidden; }
    .chat-main-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; gap: .75rem; }
    .chat-main-header h4 { flex: 1; }
    .chat-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--gray-400); flex-direction: column; gap: .5rem; }
    .chat-empty i { font-size: 3rem; }
    @media (max-width: 768px) {
      .chat-layout { grid-template-columns: 1fr; }
      .chat-sidebar { display: none; }
      .chat-sidebar.mobile-open { display: flex; position: fixed; top: 0; left: 0; bottom: 0; width: 100%; z-index: 1100; background: var(--white); }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="logo">MOV<span>AI</span></div><span class="badge">Admin</span></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
        <div class="nav-section">Gestão</div>
        <a href="properties.html" class="nav-item" data-page="properties"><i class="fas fa-building"></i> Imóveis</a>
        <a href="leads.html" class="nav-item" data-page="leads"><i class="fas fa-user-plus"></i> Leads</a>
        <a href="appointments.html" class="nav-item" data-page="appointments"><i class="fas fa-calendar-alt"></i> Agendamentos</a>
        <div class="nav-section">Sistema</div>
        <a href="users.html" class="nav-item" data-page="users"><i class="fas fa-users-cog"></i> Usuários</a>
        <a href="chatbot.html" class="nav-item" data-page="chatbot"><i class="fas fa-robot"></i> Chatbot</a>
        <a href="reports.html" class="nav-item" data-page="reports"><i class="fas fa-chart-bar"></i> Relatórios</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-avatar">U</div>
        <div class="user-info"><div class="user-name">Usuário</div><div class="user-role">Admin</div></div>
        <button class="logout-btn" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </aside>

    <div class="main-content">
      <header class="top-header">
        <button class="menu-toggle"><i class="fas fa-bars"></i></button>
        <h2 class="page-title">Chatbot - Conversas</h2>
        <div class="header-actions"></div>
      </header>

      <div class="page-content">
        <div class="card" style="overflow:hidden">
          <div class="chat-layout">
            <!-- Conversation List -->
            <div class="chat-sidebar" id="chatSidebar">
              <div class="chat-sidebar-header">
                <input type="text" class="form-control" id="chatSearch" placeholder="Buscar conversas...">
              </div>
              <div class="chat-list-wrapper">
                <ul class="chat-list" id="chatList">
                  <li style="padding:2rem;text-align:center;color:var(--gray-400)"><div class="spinner" style="margin:0 auto"></div></li>
                </ul>
              </div>
            </div>

            <!-- Message Area -->
            <div class="chat-main" id="chatMain">
              <div class="chat-empty">
                <i class="fas fa-comments"></i>
                <p>Selecione uma conversa para visualizar</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    let conversations = [];
    let activeConversationId = null;

    async function loadConversations() {
      try {
        const res = await Api.get('/chatbot/conversations?limit=50');
        conversations = res.data?.conversations || res.data || [];
        renderConversationList();
      } catch (err) {
        Toast.error('Erro ao carregar conversas');
        document.getElementById('chatList').innerHTML = '<li style="padding:2rem;text-align:center;color:var(--gray-400)">Erro ao carregar</li>';
      }
    }

    function renderConversationList(filter = '') {
      const list = document.getElementById('chatList');
      let filtered = conversations;
      if (filter) {
        const f = filter.toLowerCase();
        filtered = conversations.filter(c => (c.lead_name || '').toLowerCase().includes(f) || String(c.id).includes(f));
      }

      if (!filtered.length) {
        list.innerHTML = '<li style="padding:2rem;text-align:center;color:var(--gray-400)">Nenhuma conversa encontrada</li>';
        return;
      }

      list.innerHTML = filtered.map(c => {
        const msgs = c.messages || [];
        const lastMsg = msgs.length ? msgs[msgs.length - 1] : null;
        return `
          <li class="chat-item ${c.id === activeConversationId ? 'active' : ''}" onclick="openConversation(${c.id})">
            <div class="chat-avatar">${getInitials(c.lead_name || 'Visitante')}</div>
            <div class="chat-info">
              <div class="chat-name">${c.lead_name || 'Visitante #' + c.id}</div>
              <div class="chat-preview">${lastMsg ? (lastMsg.content || lastMsg.text || '...').substring(0, 50) : 'Sem mensagens'}</div>
            </div>
            <div class="chat-meta">
              <div class="chat-time">${timeAgo(c.updated_at)}</div>
              ${c.message_count ? `<div class="chat-unread">${c.message_count}</div>` : ''}
            </div>
          </li>`;
      }).join('');
    }

    async function openConversation(id) {
      activeConversationId = id;
      renderConversationList(document.getElementById('chatSearch').value);

      const main = document.getElementById('chatMain');
      main.innerHTML = '<div class="page-loading" style="flex:1"><div class="spinner"></div></div>';

      try {
        const res = await Api.get(`/chatbot/conversations/${id}`);
        const conv = res.data;
        const messages = conv.messages || [];

        main.innerHTML = `
          <div class="chat-main-header">
            <div class="chat-avatar">${getInitials(conv.lead_name || 'Visitante')}</div>
            <div>
              <h4>${conv.lead_name || 'Visitante #' + conv.id}</h4>
              <span style="font-size:.75rem;color:var(--gray-500)">${getStatusBadge(conv.status)} • ${messages.length} mensagens</span>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages">
            ${messages.length ? messages.map(m => `
              <div class="chat-message ${m.role === 'user' || m.sender === 'user' ? 'user' : 'bot'}">
                <div>${m.content || m.text || ''}</div>
                <div class="msg-time">${m.timestamp ? formatDateTime(m.timestamp) : ''}</div>
              </div>
            `).join('') : '<div class="chat-empty"><p>Nenhuma mensagem nesta conversa</p></div>'}
          </div>
        `;

        // Scroll to bottom
        const msgContainer = document.getElementById('chatMessages');
        if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;

      } catch (err) {
        main.innerHTML = '<div class="chat-empty"><i class="fas fa-exclamation-circle"></i><p>Erro ao carregar conversa</p></div>';
      }
    }

    document.getElementById('chatSearch').addEventListener('input', debounce((e) => {
      renderConversationList(e.target.value);
    }));

    loadConversations();
  </script>
</body>
</html>
