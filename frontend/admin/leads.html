<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOVAI Admin - Leads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="logo">MOV<span>AI</span></div><span class="badge">Admin</span></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
        <div class="nav-section">Gestão</div>
        <a href="properties.html" class="nav-item" data-page="properties"><i class="fas fa-building"></i> Imóveis</a>
        <a href="leads.html" class="nav-item" data-page="leads"><i class="fas fa-user-plus"></i> Leads</a>
        <a href="appointments.html" class="nav-item" data-page="appointments"><i class="fas fa-calendar-alt"></i> Agendamentos</a>
        <div class="nav-section">Sistema</div>
        <a href="users.html" class="nav-item" data-page="users"><i class="fas fa-users-cog"></i> Usuários</a>
        <a href="chatbot.html" class="nav-item" data-page="chatbot"><i class="fas fa-robot"></i> Chatbot</a>
        <a href="reports.html" class="nav-item" data-page="reports"><i class="fas fa-chart-bar"></i> Relatórios</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-avatar">U</div>
        <div class="user-info"><div class="user-name">Usuário</div><div class="user-role">Admin</div></div>
        <button class="logout-btn" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </aside>

    <div class="main-content">
      <header class="top-header">
        <button class="menu-toggle"><i class="fas fa-bars"></i></button>
        <h2 class="page-title">Leads</h2>
        <div class="header-actions"><div class="header-search"><i class="fas fa-search"></i><input type="text" placeholder="Buscar..." id="globalSearch"></div></div>
      </header>

      <div class="page-content">
        <div class="toolbar">
          <div class="filters-bar">
            <div class="search-input"><i class="fas fa-search"></i><input type="text" class="form-control" id="searchInput" placeholder="Buscar leads..."></div>
            <select class="form-control" id="filterStatus">
              <option value="">Todos os Status</option>
              <option value="novo">Novo</option>
              <option value="contactado">Contactado</option>
              <option value="qualificado">Qualificado</option>
              <option value="proposta">Proposta</option>
              <option value="convertido">Convertido</option>
              <option value="perdido">Perdido</option>
            </select>
            <select class="form-control" id="filterSource">
              <option value="">Todas as Fontes</option>
              <option value="site">Site</option>
              <option value="chatbot">Chatbot</option>
              <option value="indicacao">Indicação</option>
              <option value="telefone">Telefone</option>
              <option value="email">Email</option>
              <option value="social_media">Redes Sociais</option>
              <option value="outro">Outro</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="openLeadModal()"><i class="fas fa-plus"></i> Novo Lead</button>
        </div>

        <div class="card">
          <div class="card-body no-padding">
            <div class="table-wrapper">
              <table id="leadsTable">
                <thead>
                  <tr>
                    <th data-sort="id">ID <i class="fas fa-sort sort-icon"></i></th>
                    <th data-sort="name">Nome <i class="fas fa-sort sort-icon"></i></th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                    <th>Fonte</th>
                    <th data-sort="status">Status <i class="fas fa-sort sort-icon"></i></th>
                    <th>Imóvel</th>
                    <th>Corretor</th>
                    <th data-sort="created_at">Data <i class="fas fa-sort sort-icon"></i></th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="leadsBody">
                  <tr><td colspan="10"><div class="page-loading"><div class="spinner"></div></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class="card-footer">
            <span class="page-info" id="pageInfo">-</span>
            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Lead Modal (Add/Edit) -->
  <div class="modal-overlay" id="leadModal">
    <div class="modal">
      <div class="modal-header"><h3 id="leadModalTitle">Novo Lead</h3><button class="modal-close"><i class="fas fa-times"></i></button></div>
      <div class="modal-body">
        <form id="leadForm">
          <input type="hidden" id="leadId">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Nome *</label>
              <input type="text" class="form-control" id="leadName" required><div class="form-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label">E-mail *</label>
              <input type="email" class="form-control" id="leadEmail" required><div class="form-error"></div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Telefone</label>
              <input type="text" class="form-control" id="leadPhone">
            </div>
            <div class="form-group">
              <label class="form-label">Fonte</label>
              <select class="form-control" id="leadSource">
                <option value="site">Site</option>
                <option value="chatbot">Chatbot</option>
                <option value="indicacao">Indicação</option>
                <option value="telefone">Telefone</option>
                <option value="email">Email</option>
                <option value="social_media">Redes Sociais</option>
                <option value="outro">Outro</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-control" id="leadStatus">
                <option value="novo">Novo</option>
                <option value="contactado">Contactado</option>
                <option value="qualificado">Qualificado</option>
                <option value="proposta">Proposta</option>
                <option value="convertido">Convertido</option>
                <option value="perdido">Perdido</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">ID do Imóvel</label>
              <input type="number" class="form-control" id="leadPropertyId" placeholder="Opcional">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Notas</label>
            <textarea class="form-control" id="leadNotes" rows="3" placeholder="Observações sobre o lead..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="Modal.close('leadModal')">Cancelar</button>
        <button class="btn btn-primary" id="saveLead"><i class="fas fa-save"></i> Salvar</button>
      </div>
    </div>
  </div>

  <!-- Lead Details Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal modal-lg">
      <div class="modal-header"><h3>Detalhes do Lead</h3><button class="modal-close"><i class="fas fa-times"></i></button></div>
      <div class="modal-body" id="detailContent">
        <div class="page-loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal modal-sm">
      <div class="modal-header"><h3>Confirmar Exclusão</h3><button class="modal-close"><i class="fas fa-times"></i></button></div>
      <div class="modal-body"><p style="text-align:center"><i class="fas fa-exclamation-triangle" style="font-size:2.5rem;color:var(--danger);display:block;margin-bottom:1rem"></i>Tem certeza que deseja excluir este lead?</p></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="Modal.close('deleteModal')">Cancelar</button>
        <button class="btn btn-danger" id="confirmDelete"><i class="fas fa-trash"></i> Excluir</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    let currentPage = 1;
    let deleteId = null;

    async function loadLeads(page = 1) {
      currentPage = page;
      const search = document.getElementById('searchInput').value;
      const status = document.getElementById('filterStatus').value;
      const source = document.getElementById('filterSource').value;
      let url = `/leads?page=${page}&limit=10`;
      if (search) url += `&search=${encodeURIComponent(search)}`;
      if (status) url += `&status=${status}`;
      if (source) url += `&source=${source}`;

      const tbody = document.getElementById('leadsBody');
      showLoading(tbody.closest('.card'));
      try {
        const res = await Api.get(url);
        const items = res.data?.leads || res.data || [];
        const pagination = res.pagination || {};

        if (!items.length) {
          tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><i class="fas fa-user-plus"></i><h4>Nenhum lead encontrado</h4></div></td></tr>';
        } else {
          tbody.innerHTML = items.map(l => `
            <tr>
              <td>#${l.id}</td>
              <td><strong>${l.name || '-'}</strong></td>
              <td>${l.email || '-'}</td>
              <td>${l.phone || '-'}</td>
              <td><span class="badge badge-gray">${l.source || '-'}</span></td>
              <td>${getStatusBadge(l.status)}</td>
              <td>${l.property_title || '-'}</td>
              <td>${l.agent_name || '-'}</td>
              <td>${formatDate(l.created_at)}</td>
              <td>
                <div class="action-btns">
                  <button class="btn btn-icon btn-ghost sm" title="Ver Detalhes" onclick="viewLead(${l.id})"><i class="fas fa-eye"></i></button>
                  <button class="btn btn-icon btn-ghost sm" title="Editar" onclick="editLead(${l.id})"><i class="fas fa-pen"></i></button>
                  <button class="btn btn-icon btn-ghost sm" title="Excluir" onclick="confirmDelete(${l.id})"><i class="fas fa-trash" style="color:var(--danger)"></i></button>
                </div>
              </td>
            </tr>
          `).join('');
        }
        document.getElementById('pageInfo').textContent = `Mostrando ${items.length} de ${pagination.total || items.length} leads`;
        renderPagination(document.getElementById('pagination'), pagination.page || 1, pagination.totalPages || 1, loadLeads);
      } catch (err) {
        Toast.error('Erro ao carregar leads');
        tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><p>Erro ao carregar</p></div></td></tr>';
      } finally { hideLoading(tbody.closest('.card')); }
    }

    function openLeadModal(data = null) {
      document.getElementById('leadModalTitle').textContent = data ? 'Editar Lead' : 'Novo Lead';
      document.getElementById('leadId').value = data ? data.id : '';
      document.getElementById('leadName').value = data ? data.name : '';
      document.getElementById('leadEmail').value = data ? data.email : '';
      document.getElementById('leadPhone').value = data ? (data.phone || '') : '';
      document.getElementById('leadSource').value = data ? (data.source || 'site') : 'site';
      document.getElementById('leadStatus').value = data ? (data.status || 'novo') : 'novo';
      document.getElementById('leadPropertyId').value = data ? (data.property_id || '') : '';
      document.getElementById('leadNotes').value = data ? (data.notes || '') : '';
      Modal.open('leadModal');
    }

    async function editLead(id) {
      try {
        const res = await Api.get(`/leads/${id}`);
        openLeadModal(res.data);
      } catch (err) { Toast.error('Erro ao carregar lead'); }
    }

    async function viewLead(id) {
      Modal.open('detailModal');
      const content = document.getElementById('detailContent');
      content.innerHTML = '<div class="page-loading"><div class="spinner"></div></div>';
      try {
        const [leadRes, interRes] = await Promise.all([
          Api.get(`/leads/${id}`),
          Api.get(`/leads/${id}/interactions?limit=20`)
        ]);
        const l = leadRes.data;
        const interactions = interRes.data?.interactions || interRes.data || [];
        content.innerHTML = `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
            <div><strong>Nome:</strong> ${l.name}</div>
            <div><strong>E-mail:</strong> ${l.email}</div>
            <div><strong>Telefone:</strong> ${l.phone || '-'}</div>
            <div><strong>Fonte:</strong> ${l.source || '-'}</div>
            <div><strong>Status:</strong> ${getStatusBadge(l.status)}</div>
            <div><strong>Imóvel:</strong> ${l.property_title || '-'}</div>
            <div><strong>Corretor:</strong> ${l.agent_name || '-'}</div>
            <div><strong>Data:</strong> ${formatDateTime(l.created_at)}</div>
          </div>
          ${l.notes ? `<div style="margin-bottom:1.5rem"><strong>Notas:</strong><p style="color:var(--gray-600);margin-top:.25rem">${l.notes}</p></div>` : ''}
          <h4 style="margin-bottom:.75rem">Histórico de Interações</h4>
          ${interactions.length ? `<ul class="activity-list">${interactions.map(i => `
            <li class="activity-item">
              <div class="activity-icon" style="background:var(--info-bg);color:var(--info)"><i class="fas fa-comment"></i></div>
              <div class="activity-content">
                <p><strong>${i.type || 'nota'}:</strong> ${i.description || '-'}</p>
                <div class="activity-time">${i.user_name || ''} • ${formatDateTime(i.created_at)}</div>
              </div>
            </li>
          `).join('')}</ul>` : '<p style="color:var(--gray-400);font-size:.85rem">Nenhuma interação registrada</p>'}
        `;
      } catch (err) {
        content.innerHTML = '<div class="empty-state"><p>Erro ao carregar detalhes</p></div>';
      }
    }

    document.getElementById('saveLead').addEventListener('click', async () => {
      if (!validateForm('leadForm')) return;
      const id = document.getElementById('leadId').value;
      const data = {
        name: document.getElementById('leadName').value,
        email: document.getElementById('leadEmail').value,
        phone: document.getElementById('leadPhone').value,
        source: document.getElementById('leadSource').value,
        status: document.getElementById('leadStatus').value,
        property_id: document.getElementById('leadPropertyId').value || null,
        notes: document.getElementById('leadNotes').value
      };
      try {
        if (id) { await Api.put(`/leads/${id}`, data); Toast.success('Lead atualizado!'); }
        else { await Api.post('/leads', data); Toast.success('Lead criado!'); }
        Modal.close('leadModal');
        loadLeads(currentPage);
      } catch (err) { Toast.error('Erro: ' + err.message); }
    });

    function confirmDelete(id) { deleteId = id; Modal.open('deleteModal'); }
    document.getElementById('confirmDelete').addEventListener('click', async () => {
      if (!deleteId) return;
      try { await Api.delete(`/leads/${deleteId}`); Toast.success('Lead excluído'); Modal.close('deleteModal'); loadLeads(currentPage); }
      catch (err) { Toast.error('Erro: ' + err.message); }
      deleteId = null;
    });

    document.getElementById('searchInput').addEventListener('input', debounce(() => loadLeads(1)));
    document.getElementById('filterStatus').addEventListener('change', () => loadLeads(1));
    document.getElementById('filterSource').addEventListener('change', () => loadLeads(1));

    loadLeads();
  </script>
</body>
</html>
