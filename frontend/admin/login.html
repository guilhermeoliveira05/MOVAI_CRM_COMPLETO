<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOVAI Admin - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <h1>MOV<span>AI</span></h1>
        <p>Painel Administrativo</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
          <div class="form-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <div style="position:relative">
            <input type="password" class="form-control" id="password" placeholder="••••••" required style="padding-right:2.5rem">
            <button type="button" id="togglePassword" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-400);cursor:pointer"><i class="fas fa-eye"></i></button>
          </div>
          <div class="form-error"></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
          <div class="form-check">
            <input type="checkbox" id="remember">
            <label for="remember">Lembrar-me</label>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Entrar
        </button>
        <div id="loginError" style="color:var(--danger);font-size:.85rem;text-align:center;margin-top:1rem;display:none"></div>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isAuthenticated()) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const pwd = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        loginError.textContent = 'Preencha todos os campos';
        loginError.style.display = 'block';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

      try {
        const data = await Api.post('/auth/login', { email, password });
        Auth.setToken(data.data.token);
        Auth.setUser(data.data.user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        loginError.textContent = err.message || 'Credenciais inválidas';
        loginError.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
      }
    });
  </script>
</body>
</html>
